<svg viewBox="0 0 600 440" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Garmin golf-spelvy">
  <title>Garmin golf-spelvy — knappstyrd</title>
  <desc>Rund Garmin-klocka: hål och par överst, front/back-avstånd, slag. Vänster upp/ned-knappar ändrar slag; höger knappar är nästa och föregående hål.</desc>

  <rect x="0" y="0" width="600" height="440" fill="#ffffff"/>

  <circle cx="300" cy="210" r="172" fill="#26262a"/>
  <circle cx="300" cy="210" r="150" fill="#000000"/>

  <rect x="120" y="146" width="20" height="42" rx="7" fill="#46464a"/>
  <rect x="120" y="232" width="20" height="42" rx="7" fill="#46464a"/>
  <rect x="460" y="146" width="20" height="42" rx="7" fill="#46464a"/>
  <rect x="460" y="232" width="20" height="42" rx="7" fill="#46464a"/>

  <text x="300" y="112" text-anchor="middle" fill="#ffffff" font-family="sans-serif" font-size="21" font-weight="700">Hole 7</text>
  <text x="300" y="134" text-anchor="middle" fill="#8e8e93" font-family="sans-serif" font-size="14">Par 4</text>
  <line x1="205" y1="150" x2="395" y2="150" stroke="#2c2c2e" stroke-width="1"/>

  <text x="208" y="196" fill="#8e8e93" font-family="sans-serif" font-size="13" font-weight="600">FRONT</text>
  <text x="380" y="200" text-anchor="end" fill="#97C459" font-family="sans-serif" font-size="40" font-weight="800">132</text>
  <text x="394" y="200" text-anchor="end" fill="#8e8e93" font-family="sans-serif" font-size="13" font-weight="600">m</text>

  <text x="208" y="242" fill="#8e8e93" font-family="sans-serif" font-size="13" font-weight="600">BACK</text>
  <text x="380" y="245" text-anchor="end" fill="#ffffff" font-family="sans-serif" font-size="29" font-weight="800">154</text>
  <text x="394" y="245" text-anchor="end" fill="#8e8e93" font-family="sans-serif" font-size="13" font-weight="600">m</text>

  <text x="208" y="292" fill="#8e8e93" font-family="sans-serif" font-size="13" font-weight="600">STROKES</text>
  <text x="394" y="296" text-anchor="end" fill="#ffffff" font-family="sans-serif" font-size="29" font-weight="800">3</text>

  <line x1="118" y1="167" x2="86" y2="167" stroke="#b4b2a9" stroke-width="1.5"/>
  <line x1="118" y1="253" x2="86" y2="253" stroke="#b4b2a9" stroke-width="1.5"/>
  <line x1="482" y1="167" x2="514" y2="167" stroke="#b4b2a9" stroke-width="1.5"/>
  <line x1="482" y1="253" x2="514" y2="253" stroke="#b4b2a9" stroke-width="1.5"/>

  <text x="80" y="164" text-anchor="end" fill="#2c2c2a" font-family="sans-serif" font-size="15" font-weight="500">▲ +1 slag</text>
  <text x="80" y="182" text-anchor="end" fill="#888780" font-family="sans-serif" font-size="12">UP-knapp</text>
  <text x="80" y="250" text-anchor="end" fill="#2c2c2a" font-family="sans-serif" font-size="15" font-weight="500">▼ −1 slag</text>
  <text x="80" y="268" text-anchor="end" fill="#888780" font-family="sans-serif" font-size="12">DOWN-knapp</text>

  <text x="520" y="164" fill="#2c2c2a" font-family="sans-serif" font-size="15" font-weight="500">Nästa hål ▶</text>
  <text x="520" y="182" fill="#888780" font-family="sans-serif" font-size="12">START</text>
  <text x="520" y="250" fill="#2c2c2a" font-family="sans-serif" font-size="15" font-weight="500">◀ Föregående</text>
  <text x="520" y="268" fill="#888780" font-family="sans-serif" font-size="12">BACK</text>

  <text x="300" y="418" text-anchor="middle" fill="#5f5e5a" font-family="sans-serif" font-size="13">Sista hålet → START blir "Finish round" (Yes / No)</text>
</svg>
