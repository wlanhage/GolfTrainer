name: PR Checks

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  required-mobile:
    name: Required / Mobile (lint + typecheck)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mobile/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck

  required-backend:
    name: Required / Backend (lint + typecheck)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck

  soft-env-dependent:
    name: Soft / Env-dependent checks (non-blocking)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Placeholder for env-dependent checks
        run: |
          echo "Run integration/E2E checks here when test deploy and secrets are ready."
          echo "This job is intentionally non-blocking for now."
