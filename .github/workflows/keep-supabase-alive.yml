name: Keep Supabase alive

# Supabase free-tier projects pause after 7 days of inactivity. This runs a real
# query against the database every 3 days, which resets the inactivity timer so
# the project never pauses.
#
# Setup (once): add a repository secret SUPABASE_DB_URL with the project's
# Postgres connection string (Supabase dashboard → Project Settings → Database →
# Connection string → URI; include ?sslmode=require). Use the direct/session
# connection (port 5432).
#
# Note: scheduled workflows only run from the DEFAULT branch (main), and GitHub
# disables schedules after 60 days with no repo activity.

on:
  schedule:
    - cron: '17 6 */3 * *' # every 3 days at 06:17 UTC
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Query the database
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          if [ -z "$SUPABASE_DB_URL" ]; then
            echo "::error::Missing SUPABASE_DB_URL secret"; exit 1
          fi
          sudo apt-get update -qq && sudo apt-get install -y -qq postgresql-client
          # Reads a table that always exists in a Supabase project → real DB activity.
          psql "$SUPABASE_DB_URL" -tAc "select count(*) from auth.users;"
          echo "Supabase pinged — inactivity timer reset."
